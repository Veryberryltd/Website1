    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.

    const doc = new DOMParser().parseFromString(template, 'text/html');

      // which transformScriptTags handles unconditionally.

 opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100vh; background: oklch(98.5% 0.012 85); overflow-x: hidden;\">\n\n  <!-- NAV -->\n  <header style=\"position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px 20px; padding: 16px clamp(16px, 5vw, 48px); background: oklch(98% 0.006 80 / 0.92); backdrop-filter: blur(8px); border-bottom: 1px solid oklch(90% 0.01 60);\">\n    <img src=\"e1c557a8-68f4-4e9f-be5d-85942d9fab02\" alt=\"Very Berry Ltd\" style=\"height: clamp(78px, 10vw, 104px); width: auto;\">\n    <nav style=\"display: flex; flex-wrap: wrap; gap: 12px 24px; align-items: center; justify-content: flex-end;\">\n      <a href=\"#about\" style=\"font-size: 15px; font-weight: 500; color: oklch(30% 0.02 30);\">About<\u002Fa>\n      <a href=\"#brands\" style=\"font-size: 15px; font-weight: 500; color: oklch(30% 0.02 30);\">Our Brands<\u002Fa>\n      <a href=\"#certifications\" style=\"font-size: 15px; font-weight: 500; color: oklch(30% 0.02 30);\">Certifications<\u002Fa>\n      <a href=\"#contact\" style=\"font-size: 15px; font-weight: 500; color: oklch(30% 0.02 30);\">Contact<\u002Fa>\n      <a href=\"#contact\" style=\"padding: 10px 20px; border-radius: 999px; background: oklch(32% 0.09 150); color: white; font-weight: 600; font-size: 14px; white-space: nowrap;\" style-hover=\"background: oklch(26% 0.1 150);\">Get in Touch<\u002Fa>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section data-screen-label=\"Hero\" style=\"padding: clamp(56px, 10vw, 120px) clamp(16px, 5vw, 48px) clamp(48px, 8vw, 100px); max-width: 1160px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: clamp(32px, 6vw, 64px); align-items: center;\">\n    <div style=\"animation: fadeUp 0.7s ease both;\">\n      <div style=\"display: inline-block; padding: 6px 14px; border-radius: 999px; background: oklch(93% 0.04 150); color: oklch(30% 0.1 150); font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 24px;\">Tanzanian Based<\u002Fdiv>\n      <h1 style=\"font-family: 'Sora', sans-serif; font-size: clamp(34px, 6vw, 56px); line-height: 1.05; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 12px; color: oklch(24% 0.02 30);\">Three brands. One promise of quality.<\u002Fh1>\n      <p style=\"font-family: 'Sora', sans-serif; font-size: 17px; font-weight: 600; font-style: italic; color: oklch(32% 0.09 150); margin: 0 0 20px;\">From Farm to Table, Naturally.<\u002Fp>\n      <p style=\"font-size: 18px; line-height: 1.6; color: oklch(38% 0.02 30); max-width: 480px; margin: 0 0 32px;\">From a single 60sqm store in 2021, Very Berry Ltd has grown into a vertically integrated group spanning fresh produce retail, wholesale imports and manufacturing — serving Tanzania and Zanzibar with quality and traceability at every step.<\u002Fp>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 16px;\">\n        <a href=\"#brands\" style=\"padding: 14px 28px; border-radius: 999px; background: oklch(32% 0.09 150); color: white; font-weight: 600; font-size: 15px;\" style-hover=\"background: oklch(26% 0.1 150);\">Explore our brands<\u002Fa>\n        <a href=\"#contact\" style=\"padding: 14px 28px; border-radius: 999px; border: 1.5px solid oklch(70% 0.02 30); color: oklch(28% 0.02 30); font-weight: 600; font-size: 15px;\" style-hover=\"border-color: oklch(32% 0.09 150); color: oklch(32% 0.09 150);\">Contact us<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position: relative; aspect-ratio: 4/3; border-radius: 24px; overflow: hidden; animation: fadeUp 0.7s ease 0.1s both;\">\n      <image-slot id=\"hero-group-photo\" shape=\"rect\" placeholder=\"Drop your group photo here\"><\u002Fimage-slot>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT -->\n  <section id=\"about\" data-screen-label=\"About\" style=\"padding: clamp(56px, 8vw, 80px) clamp(16px, 5vw, 48px); background: #0A5742;\">\n    <div style=\"max-width: 1160px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 40px;\">\n      <div>\n        <h2 style=\"font-family: 'Sora', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 8px; color: white;\">Who We Are<\u002Fh2>\n        <div style=\"width: 48px; height: 4px; border-radius: 2px; background: oklch(80% 0.08 150);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size: 18px; line-height: 1.75; color: oklch(92% 0.015 150); margin: 0 0 32px;\">Very Berry Ltd is a Tanzanian-based collection of independent businesses spanning fresh produce, wholesale distribution, food manufacturing and hospitality. Each brand operates on its own, but all share Very Berry Ltd's commitment to quality, reliability and honest service — from farm to table.<\u002Fp>\n        <div id=\"vb-stats-row\" style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; margin-top: 8px; border-top: 1px solid oklch(45% 0.04 150);\">\n          <div style=\"padding: 24px 16px 0 0; border-right: 1px solid oklch(45% 0.04 150);\">\n            <div style=\"font-family: 'Sora', sans-serif; font-size: clamp(22px, 4vw, 30px); font-weight: 800; letter-spacing: -0.01em; color: white;\">{{ statYearDisplay }}<\u002Fdiv>\n            <div style=\"font-size: 14.5px; color: oklch(80% 0.03 150); margin-top: 4px;\">Founded, from a 60sqm store<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 24px 16px; border-right: 1px solid oklch(45% 0.04 150);\">\n            <div style=\"font-family: 'Sora', sans-serif; font-size: clamp(22px, 4vw, 30px); font-weight: 800; letter-spacing: -0.01em; color: white;\">{{ statBranchesDisplay }}<\u002Fdiv>\n            <div style=\"font-size: 14.5px; color: oklch(80% 0.03 150); margin-top: 4px;\">Retail branches, mainland &amp; Zanzibar<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 24px 0 0 16px;\">\n            <div style=\"font-family: 'Sora', sans-serif; font-size: clamp(22px, 4vw, 30px); font-weight: 800; letter-spacing: -0.01em; color: white;\">{{ statTeamDisplay }}<\u002Fdiv>\n            <div style=\"font-size: 14.5px; color: oklch(80% 0.03 150); margin-top: 4px;\">Employees across sales, factory &amp; warehouse<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size: 13.5px; color: oklch(75% 0.02 150); margin: 24px 0 0; line-height: 1.7;\">TBS-certified factory &amp; products · TBS/ZFDA registered premises · All brands trademarked<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- BRANDS -->\n  <section id=\"brands\" data-screen-label=\"Brands\" style=\"padding: clamp(56px, 9vw, 96px) clamp(16px, 5vw, 48px); max-width: 1160px; margin: 0 auto;\">\n    <div style=\"text-align: center; margin-bottom: 56px;\">\n      <h2 style=\"font-family: 'Sora', sans-serif; font-size: 36px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 12px; color: oklch(24% 0.02 30);\">Our Brands<\u002Fh2>\n      <p style=\"font-size: 17px; color: oklch(42% 0.02 30); margin: 0;\">Three businesses, each with its own focus and identity.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;\">\n      <sc-for list=\"{{ brands }}\" as=\"brand\" hint-placeholder-count=\"5\">\n        <div style=\"background: white; border-radius: 20px; border: 1px solid oklch(91% 0.01 60); padding: 32px; display: flex; flex-direction: column; gap: 16px; position: relative; box-shadow: 0 1px 3px oklch(20% 0 0 / 0.04); transition: box-shadow 0.2s ease, transform 0.2s ease;\" style-hover=\"box-shadow: 0 12px 28px oklch(20% 0.02 150 / 0.1); transform: translateY(-3px);\">\n          <sc-if value=\"{{ brand.comingSoon }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position: absolute; top: 24px; right: 24px; padding: 5px 12px; border-radius: 999px; background: oklch(93% 0.03 90); color: oklch(45% 0.06 80); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;\">Coming Soon<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"height: 150px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid oklch(95% 0.01 60); padding-bottom: 20px; margin-bottom: 4px;\">\n            <img src=\"{{ brand.logo }}\" alt=\"{{ brand.name }} logo\" style=\"height: 100%; width: auto; max-width: 300px; object-fit: contain;\">\n          <\u002Fdiv>\n          <div>\n            <h3 style=\"font-family: 'Sora', sans-serif; font-size: 21px; font-weight: 700; margin: 0 0 4px; color: oklch(24% 0.02 30);\">{{ brand.name }}<\u002Fh3>\n            <div style=\"font-size: 13px; font-weight: 600; color: oklch(32% 0.09 150); text-transform: uppercase; letter-spacing: 0.04em;\">{{ brand.tag }}<\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size: 15px; line-height: 1.6; color: oklch(40% 0.02 30); margin: 0; flex: 1;\">{{ brand.blurb }}<\u002Fp>\n          <sc-if value=\"{{ brand.hasWebsite }}\" hint-placeholder-val=\"{{ false }}\">\n            <a href=\"{{ brand.website }}\" target=\"_blank\" rel=\"noopener\" style=\"display: inline-flex; align-items: center; gap: 6px; font-size: 13.5px; font-weight: 600; color: oklch(32% 0.09 150); width: fit-content;\" style-hover=\"text-decoration: underline;\">\n              <svg sc-camel-view-box=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z\"><\u002Fpath><\u002Fsvg>\n              <span>{{ brand.websiteLabel }}<\u002Fspan>\n            <\u002Fa>\n          <\u002Fsc-if>\n          <div sform: uppercase; letter-spacing: 0.04em; color: oklch(65% 0.03 150); margin-bottom: 2px;\">Email<\u002Fdiv>\n              <div style=\"font-size: 16px; color: white;\">admin@veryberry.co.tz<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top: auto; padding-top: 40px; font-size: 13.5px; color: oklch(92% 0.015 150);\">Prefer to reach a specific brand directly? Select it in the form and we'll pass your message along.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background: white; border-radius: 20px; padding: clamp(24px, 4vw, 36px); align-self: start;\">\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 12px; padding: 40px 0;\">\n            <div style=\"width: 56px; height: 56px; border-radius: 50%; background: oklch(93% 0.05 150); display: flex; align-items: center; justify-content: center; font-size: 26px; color: oklch(45% 0.1 150);\">✓<\u002Fdiv>\n            <h3 style=\"font-family: 'Sora', sans-serif; font-size: 20px; margin: 0; color: oklch(24% 0.02 30);\">Message sent<\u002Fh3>\n            <p style=\"font-size: 14.5px; color: oklch(45% 0.02 30); margin: 0;\">Thanks for reaching out — we'll be in touch soon.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ !submitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <form sc-camel-on-submit=\"{{ handleSubmit }}\" style=\"display: flex; flex-direction: column; gap: 18px;\">\n            <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 18px;\">\n              <label style=\"display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: oklch(34% 0.02 30);\">\n                Name\n                <input type=\"text\" required=\"true\" value=\"{{ form.name }}\" sc-camel-on-change=\"{{ onNameChange }}\" style=\"padding: 12px 14px; border-radius: 10px; border: 1px solid oklch(88% 0.01 60); font-size: 15px; outline: none;\">\n              <\u002Flabel>\n              <label style=\"display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: oklch(34% 0.02 30);\">\n                Email\n                <input type=\"email\" required=\"true\" value=\"{{ form.email }}\" sc-camel-on-change=\"{{ onEmailChange }}\" style=\"padding: 12px 14px; border-radius: 10px; border: 1px solid oklch(88% 0.01 60); font-size: 15px; outline: none;\">\n              <\u002Flabel>\n            <\u002Fdiv>\n            <label style=\"display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: oklch(34% 0.02 30);\">\n              Which brand is this about?\n              <sc-raw-select value=\"{{ form.brand }}\" sc-camel-on-change=\"{{ onBrandChange }}\" style=\"padding: 12px 14px; border-radius: 10px; border: 1px solid oklch(88% 0.01 60); font-size: 15px; outline: none; background: white;\">\n                <sc-for list=\"{{ brandOptions }}\" as=\"opt\" hint-placeholder-count=\"6\">\n                  <option value=\"{{ opt }}\">{{ opt }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Flabel>\n            <label style=\"display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: oklch(34% 0.02 30);\">\n              Message\n              <textarea required=\"true\" rows=\"4\" value=\"{{ form.message }}\" sc-camel-on-change=\"{{ onMessageChange }}\" style=\"padding: 12px 14px; border-radius: 10px; border: 1px solid oklch(88% 0.01 60); font-size: 15px; outline: none; resize: vertical; font-family: inherit;\"><\u002Ftextarea>\n            <\u002Flabel>\n            <button type=\"submit\" style=\"margin-top: 4px; padding: 14px; border-radius: 10px; border: none; background: oklch(32% 0.09 150); color: white; font-weight: 700; font-size: 15px; cursor: pointer;\" style-hover=\"background: oklch(26% 0.1 150);\">Send message<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding: 32px clamp(16px, 5vw, 48px); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; background: #0A5742;\">\n    <img src=\"19ece761-6626-423c-a54f-f899f30abb56\" alt=\"Very Berry Ltd\" style=\"height: clamp(62px, 8vw, 78px); width: auto;\">\n    <div style=\"font-size: 13.5px; color: oklch(92% 0.015 150);\">© 2026 Very Berry Ltd, Tanzania. All rights reserved.<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    form: { name: '', email: '', brand: 'General enquiry', message: '' },\n    submitted: false,\n    expandedBrands: {},\n    expandedAddress: {},\n    statsAnimated: false,\n    statYear: 2021,\n    statBranches: 0,\n    statTeam: 0\n  };\n\n  componentDidMount() {\n    const el = document.getElementById('vb-stats-row');\n    if (!el || typeof IntersectionObserver === 'undefined') return;\n    const obs = new IntersectionObserver((entries) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting && !this.state.statsAnimated) {\n          this.setState({ statsAnimated: true });\n          this.animateStats();\n          obs.disconnect();\n        }\n      });\n    }, { threshold: 0.15 });\n    obs.observe(el);\n  }\n\n  animateStats() {\n    const duration = 1200;\n    const start = performance.now();\n    const targets = { statYear: 2021, statBranches: 3, statTeam: 50 };\n    const froms = { statYear: 1990, statBranches: 0, statTeam: 0 };\n    const tick = (now) => {\n      const t = Math.min(1, (now - start) / duration);\n      const eased = 1 - Math.pow(1 - t, 3);\n      this.setState({\n        statYear: Math.round(froms.statYear + (targets.statYear - froms.statYear) * eased),\n        statBranches: Math.round(froms.statBranches + (targets.statBranches - froms.statBranches) * eased),\n        statTeam: Math.round(froms.statTeam + (targets.statTeam - froms.statTeam) * eased)\n      });\n      if (t < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  toggleBranches(name) {\n    return () => this.setState(s => ({ expandedBrands: { ...s.expandedBrands, [name]: !s.expandedBrands[name] } }));\n  }\n\n  toggleAddress(name) {\n    return () => this.setState(s => ({ expandedAddress: { ...s.expandedAddress, [name]: !s.expandedAddress[name] } }));\n  }\n\n  setField(key, val) {\n    this.setState(s => ({ form: { ...s.form, [key]: val } }));\n  }\n\n  onNameChange(e) { this.setField('name', e.target.value); }\n  onEmailChange(e) { this.setField('email', e.target.value); }\n  onBrandChange(e) { this.setField('brand', e.target.value); }\n  onMessageChange(e) { this.setField('message', e.target.value); }\n\n  handleSubmit(e) {\n    if (e && e.preventDefault) e.preventDefault();\n    const f = this.state.form;\n    // Formspree endpoint — replace YOUR_FORM_ID with the ID from your Formspree form.\n    const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xgojgzqp';\n    fetch(FORMSPREE_ENDPOINT, {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n      body: JSON.stringify({\n        name: f.name,\n        email: f.email,\n        brand: f.brand,\n        message: f.message,\n        _subject: 'Website enquiry — ' + (f.brand || 'General enquiry')\n      })\n    }).catch(() => {});\n    this.setState({ submitted: true });\n  }\n\n  renderVals() {\n    const brands = [\n      {\n        name: 'Cilantro',\n        tag: 'Retail',\n        logo: './assets/logo-cilantro.png',\n        blurb: 'A fruit and veg store also serving fresh smoothies, cold-pressed juices and smoothie bowls, across three branches in Dar es Salaam

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

size: 32px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 8px; color: white;\">Who We Are<\u002Fh2>\n        <div style=\"width: 48px; height: 4px; border-radius: 2px; background: oklch(80% 0.08 150);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size: 18px; line-height: 1.75; color: oklch(92% 0.015 150); margin: 0 0 32px;\">Very Berry Ltd is a Tanzanian-based collection of independent businesses spanning fresh produce, wholesale distribution, food manufacturing and hospitality. Each brand operates on its own, but all share Very Berry Ltd's commitment to quality, reliability and honest service — from farm to table.<\u002Fp>\n        <div id=\"vb-stats-row\" style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; margin-top: 8px; border-top: 1px solid oklch(45% 0.04 150);\">\n          <div style=\"padding: 24px 16px 0 0; border-right: 1px solid oklch(45% 0.04 150);\">\n            <div style=\"font-family: 'Sora', sans-serif; font-size: clamp(22px, 4vw, 30px); font-weight: 800; letter-spacing: -0.01em; color: white;\">{{ statYearDisplay }}<\u002Fdiv>\n            <div style=\"font-size: 14.5px; color: oklch(80% 0.03 150); margin-top: 4px;\">Founded, from a 60sqm store<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 24px 16px; border-right: 1px solid oklch(45% 0.04 150);\">\n            <div style=\"font-family: 'Sora', sans-serif; font-size: clamp(22px, 4vw, 30px); font-weight: 800; letter-spacing: -0.01em; color: white;\">{{ statBranchesDisplay }}<\u002Fdiv>\n            <div style=\"font-size: 14.5px; color: oklch(80% 0.03 150); margin-top: 4px;\">Retail branches, mainland &amp; Zanzibar<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding: 24px 0 0 16px;\">\n            <div style=\"font-family: 'Sora', sans-serif; font-size: clamp(22px, 4vw, 30px); font-weight: 800; letter-spacing: -0.01em; color: white;\">{{ statTeamDisplay }}<\u002Fdiv>\n            <div style=\"font-size: 14.5px; div>\n            <div>\n              <div style=\"font-size: 12.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: oklch(65% 0.03 150); margin-bottom: 2px;\">Email<\u002Fdiv>\n              <div style=\"font-size: 16px; color: white;\">admin@veryberry.co.tz<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top: auto; padding-top: 40px; border-top: 1px solid oklch(30% 0.04 150); font-size: 13.5px; color: oklch(92% 0.015 150);\">Prefer to reach a specific brand directly? Select it in the form and we'll pass your message along.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background: white; border-radius: 20px; padding: clamp(24px, 4vw, 36px); align-self: start;\">\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 12px; padding: 40px 0;\">\n            <div style=\"width: 56px; height: 56px; border-radius: 50%; background: oklch(93% 0.05 150); display: flex; align-items: center; justify-content: center; font-size: 26px; color: oklch(45% 0.1 150);\">✓<\u002Fdiv>\n            <h3 style=\"font-family: 'Sora', sans-serif; font-size: 20px; margin: 0; color: oklch(24% 0.02 30);\">Message sent<\u002Fh3>\n            <p style=\"font-size: 14.5px; color: oklch(45% 0.02 30); margin: 0;\">Thanks for reaching out — we'll be in touch soon.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ !submitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ handleSubmit }}\" style=\"display: flex; flex-direction: column; gap: 18px;\">\n            <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 18px;\">\n              <label style=\"display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: oklch(34% 0.02 30);\">\n                Name\n                <input type=\"text\" required=\"true\" value=\"{{ form.name }}\" onchange=\"{{ onNameChange }}\" style=\"padding: 12px 14px; border-radius: 10px; border: 1px solid oklch(88% 0.01 60); font-size: 15px; outline: none;\">\n              <\u002Flabel>\n              <label style=\"display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: oklch(34% 0.02 30);\">\n                Email\n                <input type=\"email\" required=\"true\" value=\"{{ form.email }}\" onchange=\"{{ onEmailChange }}\" style=\"padding: 12px 14px; border-radius: 10px; border: 1px solid oklch(88% 0.01 60); font-size: 15px; outline: none;\">\n              <\u002Flabel>\n            <\u002Fdiv>\n            <label style=\"display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: oklch(34% 0.02 30);\">\n              Which brand is this about?\n              <sc-raw-select value=\"{{ form.brand }}\" onchange=\"{{ onBrandChange }}\" style=\"padding: 12px 14px; border-radius: 10px; border: 1px solid oklch(88% 0.01 60); font-size: 15px; outline: none; background: white;\">\n                <sc-for list=\"{{ brandOptions }}\" as=\"opt\" hint-placeholder-count=\"6\">\n                  <option value=\"{{ opt }}\">{{ opt }}<\u002Foption>\n                <\u002Fsc-for>\n              <\u002Fsc-raw-select>\n            <\u002Flabel>\n            <label style=\"display: flex; flex-direction: column; gap: 6px; font-size: 13px; font-weight: 600; color: oklch(34% 0.02 30);\">\n              Message\n              <textarea required=\"true\" rows=\"4\" value=\"{{ form.message }}\" onchange=\"{{ onMessageChange }}\" style=\"padding: 12px 14px; border-radius: 10px; border: 1px solid oklch(88% 0.01 60); font-size: 15px; outline: none; resize: vertical; font-family: inherit;\"><\u002Ftextarea>\n            <\u002Flabel>\n            <button type=\"submit\" style=\"margin-top: 4px; padding: 14px; border-radius: 10px; border: none; background: oklch(32% 0.09 150); color: white; font-weight: 700; font-size: 15px; cursor: pointer;\" style-hover=\"background: oklch(26% 0.1 150);\">Send message<\u002Fbutton>\n          <\u002Fform>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding: 32px clamp(16px, 5vw, 48px); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; background: #0A5742;\">\n    <img src=\"6b5d9c28-ad9e-4e87-b4a8-f14c0cfa3fe8\" alt=\"Very Berry Ltd\" style=\"height: clamp(44px, 6vw, 64px); width: auto; filter: brightness(0) invert(1);\">\n    <div style=\"font-size: 13.5px; color: oklch(92% 0.015 150);\">© 2026 Very Berry Ltd, Tanzania. All rights reserved.<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    form: { name: '', email: '', brand: 'General enquiry', message: '' },\n    submitted: false,\n    expandedBrands: {},\n    expandedAddress: {},\n    statsAnimated: false,\n    statYear: 2021,\n    statBranches: 0,\n    statTeam: 0\n  };\n\n  componentDidMount() {\n    const el = document.getElementById('vb-stats-row');\n    if (!el || typeof IntersectionObserver === 'undefined') return;\n    const obs = new IntersectionObserver((entries) => {\n      entries.forEach(entry => {\n        if (entry.isIntersecting && !this.state.statsAnimated) {\n          this.setState({ statsAnimated: true });\n          this.animateStats();\n          obs.disconnect();\n        }\n      });\n    }, { threshold: 0.15 });\n    obs.observe(el);\n  }\n\n  animateStats() {\n    const duration = 1200;\n    const start = performance.now();\n    const targets = { statYear: 2021, statBranches: 3, statTeam: 50 };\n    const froms = { statYear: 1990, statBranches: 0, statTeam: 0 };\n    const tick = (now) => {\n      const t = Math.min(1, (now - start) / duration);\n      const eased = 1 - Math.pow(1 - t, 3);\n      this.setState({\n        statYear: Math.round(froms.statYear + (targets.statYear - froms.statYear) * eased),\n        statBranches: Math.round(froms.statBranches + (targets.statBranches - froms.statBranches) * eased),\n        statTeam: Math.round(froms.statTeam + (targets.statTeam - froms.statTeam) * eased)\n      });\n      if (t < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  toggleBranches(name) {\n    return () => this.setState(s => ({ expandedBrands: { ...s.expandedBrands, [name]: !s.expandedBrands[name] } }));\n  }\n\n  toggleAddress(name) {\n    return () => this.setState(s => ({ expandedAddress: { ...s.expandedAddress, [name]: !s.expandedAddress[name] } }));\n  }\n\n  setField(key, val) {\n    this.setState(s => ({ form: { ...s.form, [key]: val } }));\n  }\n\n  onNameChange(e) { this.setField('name', e.target.value); }\n  onEmailChange(e) { this.setField('email', e.target.value); }\n  onBrandChange(e) { this.setField('brand', e.target.value); }\n  onMessageChange(e) { this.setField('message', e.target.value); }\n\n  handleSubmit(e) {\n    if (e && e.preventDefault) e.preventDefault();\n    const f = this.state.form;\n    // Formspree endpoint — replace YOUR_FORM_ID with the ID from your Formspree form.\n    const FORMSPREE_ENDPOINT = 'https://formspree.io/f/xgojgzqp';\n    fetch(FORMSPREE_ENDPOINT, {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },\n      body: JSON.stringify({\n        name: f.name,\n        email: f.email,\n        brand: f.brand,\n        message: f.message,\n        _subject: 'Website enquiry — ' + (f.brand || 'General enquiry')\n      })\n    }).catch(() => {});\n    this.setState({ submitted: true });\n  }\n\n  renderVals() {\n    const brands = [\n      {\n        name: 'Cilantro',\n        tag: 'Retail',\n        logo: (window.__resources && window.__resources.logoCilantro
